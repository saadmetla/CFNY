  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Masonry grid — natural portrait heights ── */
    .giphy-grid {
      columns: 4;
      column-gap: 14px;
      padding: 0 24px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (max-width: 900px)  { .giphy-grid { columns: 3; } }
    @media (max-width: 600px)  { .giphy-grid { columns: 2; } }
    @media (max-width: 380px)  { .giphy-grid { columns: 1; } }

    .giphy-loading {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 20px 0 24px;
    }

    /* ── Card — no forced square, natural ratio ── */
    .card {
      --pointer-x: 50%;
      --pointer-y: 50%;
      --pointer-from-left: 0.5;
      --shine-x: 50%;
      --shine-y: 50%;

      display: block;
      break-inside: avoid;
      margin-bottom: 14px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 16px rgba(0,0,0,0.45);
      /* always GPU-composited so GIFs never reset */
      transform: translateZ(0);
      will-change: transform;
      transition: box-shadow 0.25s ease;
    }

    .card:hover {
      box-shadow: 0 10px 32px rgba(0,0,0,0.65), 0 0 16px rgba(255,255,255,0.06);
      z-index: 10;
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Holofoil shine ── */
    .card__shine {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background-image:
        linear-gradient(
          calc(var(--pointer-from-left) * 360deg + 120deg),
          rgba(248, 14,  53, 0.55) 0%,
          rgba(238,223, 16, 0.55) 16%,
          rgba( 33,233,133, 0.55) 33%,
          rgba( 13,189,233, 0.55) 50%,
          rgba(201, 41,241, 0.55) 66%,
          rgba(248, 14,  53, 0.55) 83%,
          rgba(238,223, 16, 0.55) 100%
        );
      background-size: 200% 200%;
      background-position: var(--shine-x) var(--shine-y);
      mix-blend-mode: color-dodge;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
      z-index: 2;
    }

    .card__glare {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: radial-gradient(
        circle at var(--pointer-x) var(--pointer-y),
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.06) 40%,
        transparent 70%
      );
      mix-blend-mode: overlay;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
      z-index: 3;
    }

    /* ── CF logo stamp in holofoil ── */
    .card__logo {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      -webkit-mask: url('https://raw.githubusercontent.com/amadcore2099/CFNY/refs/heads/main/images/CF_LOGO_NEW.png') center/35% no-repeat;
      mask: url('https://raw.githubusercontent.com/amadcore2099/CFNY/refs/heads/main/images/CF_LOGO_NEW.png') center/35% no-repeat;
      background-image:
        linear-gradient(
          calc(var(--pointer-from-left) * 360deg + 80deg),
          #f80e35 0%, #eedf10 20%, #21e985 40%,
          #0dbde9 60%, #c929f1 80%, #f80e35 100%
        );
      background-size: 200% 200%;
      background-position: var(--shine-x) var(--shine-y);
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
      z-index: 4;
    }

    .card:hover .card__shine { opacity: 0.28; }
    .card:hover .card__glare { opacity: 1; }
    .card:hover .card__logo  { opacity: 0.55; }

    /* ── Lightbox ── */
    .giphy-lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .giphy-lightbox.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .giphy-lightbox-inner {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .giphy-lightbox img {
      display: block;
      max-width: 90vw;
      max-height: 85vh;
      width: auto;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8);
      /* start small+invisible, animate to natural size */
      transform: scale(0.82);
      opacity: 0;
      transition: none;
    }

    .giphy-lightbox.is-open img {
      transform: scale(1);
      opacity: 1;
      transition: transform 0.4s cubic-bezier(0.34,1.4,0.64,1), opacity 0.22s ease;
    }

    .giphy-lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.75;
      transition: opacity 0.2s, background 0.2s;
    }

    .giphy-lightbox-close:hover {
      opacity: 1;
      background: rgba(255,255,255,0.18);
    }
  </style>
</head>

  <script src="app.js"></script>
  <script>
    const API_KEY  = 'rSF4xwW6RrxmQev5PirpyRlV9cNHooq0';
    const USERNAME = 'saadmetla';
    const LIMIT    = 50;

    // Cast a very wide net: vowels + common short words catch virtually every GIF title/tag
    const QUERIES  = ['a','e','i','o','the','new','on','off','rap','ny','music','video','ft','feat'];

    const grid     = document.getElementById('giphyGrid');
    const loading  = document.getElementById('giphyLoading');
    const lightbox = document.getElementById('giphyLightbox');
    const lbImg    = document.getElementById('giphyLightboxImg');
    const closeBtn = document.getElementById('giphyClose');

    /* ── Shuffle (Fisher-Yates) ── */
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    /* ── Fetch all pages for one query ── */
    async function fetchQuery(q) {
      const results = [];
      let offset = 0, total = null;
      do {
        try {
          const url = `https://api.giphy.com/v1/gifs/search?api_key=${API_KEY}&username=${USERNAME}&q=${encodeURIComponent(q)}&limit=${LIMIT}&offset=${offset}&rating=pg-13`;
          const res  = await fetch(url);
          const json = await res.json();
          if (total === null) total = json.pagination.total_count;
          if (!json.data.length) break;
          results.push(...json.data);
          offset += LIMIT;
        } catch { break; }
      } while (offset < total);
      return results;
    }

    /* ── Load everything, deduplicate, shuffle, render ── */
    async function fetchAll() {
      const seen = new Set();
      const all  = [];

      for (const q of QUERIES) {
        const batch = await fetchQuery(q);
        for (const gif of batch) {
          if (!seen.has(gif.id)) {
            seen.add(gif.id);
            all.push(gif);
          }
        }
        loading.textContent = `Loading… ${all.length} GIFs found`;
      }

      loading.textContent = `Rendering ${all.length} GIFs…`;
      shuffle(all);
      renderAll(all);
      loading.style.display = 'none';
    }

    /* ── Render all cards at once ── */
    function renderAll(gifs) {
      const frag = document.createDocumentFragment();
      gifs.forEach(gif => {
        const img = gif.images.fixed_width_downsampled || gif.images.fixed_width;
        const card = document.createElement('div');
        card.className = 'card';

        const el = document.createElement('img');
        el.src     = img.url;
        el.alt     = gif.title;
        el.loading = 'lazy';
        el.width   = img.width;
        el.height  = img.height;   // preserves natural portrait ratio

        const shine = document.createElement('div');
        shine.className = 'card__shine';

        const glare = document.createElement('div');
        glare.className = 'card__glare';

        const logo = document.createElement('div');
        logo.className = 'card__logo';

        card.append(el, shine, glare, logo);
        attachHolo(card);

        // Lightbox: show original at natural size
        const origUrl = gif.images.original.url;
        card.addEventListener('click', () => openLightbox(origUrl, gif.title));
        frag.appendChild(card);
      });
      grid.appendChild(frag);
    }

    /* ── Holofoil tilt — stays translateZ(0) so GIFs never reset ── */
    function attachHolo(card) {
      card.addEventListener('mousemove', e => {
        const r  = card.getBoundingClientRect();
        const x  = e.clientX - r.left;
        const y  = e.clientY - r.top;
        const fl = x / r.width;
        const ft = y / r.height;
        const rx = -(ft - 0.5) * 10;
        const ry =  (fl - 0.5) * 10;

        card.style.setProperty('--pointer-x',         `${x}px`);
        card.style.setProperty('--pointer-y',         `${y}px`);
        card.style.setProperty('--pointer-from-left', fl);
        card.style.setProperty('--shine-x',           `${fl * 100}%`);
        card.style.setProperty('--shine-y',           `${ft * 100}%`);
        // translateZ(0) keeps composite layer — GIFs keep playing
        card.style.transform = `perspective(700px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.03) translateZ(0)`;
      });

      card.addEventListener('mouseleave', () => {
        // return to base composited state, never remove the layer
        card.style.transform = 'translateZ(0)';
      });
    }

    /* ── Lightbox — let CSS handle the animation ── */
    function openLightbox(src, alt) {
      // clear is-open first so img resets to scale(0.82)/opacity:0 via CSS
      lightbox.classList.remove('is-open');
      lbImg.src = src;
      lbImg.alt = alt;
      // one frame later add is-open so CSS transition fires
      requestAnimationFrame(() => lightbox.classList.add('is-open'));
    }

    function closeLightbox() {
      lightbox.classList.remove('is-open');
      setTimeout(() => { lbImg.src = ''; }, 300);
    }

    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox || e.target.closest('.giphy-lightbox') === lightbox && !e.target.closest('.giphy-lightbox-inner')) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    fetchAll();
  </script>
