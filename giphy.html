  <style>
    .giphy-grid {
      columns: 4;
      column-gap: 14px;
      padding: 0 24px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (max-width: 900px) { .giphy-grid { columns: 3; } }
    @media (max-width: 600px) { .giphy-grid { columns: 2; } }
    @media (max-width: 380px) { .giphy-grid { columns: 1; } }

    /* Card — pre-promoted compositing layer so GIFs never reset on tilt */
    .card {
      --pointer-x: 50%;
      --pointer-y: 50%;
      --pointer-from-left: 0.5;
      --shine-x: 50%;
      --shine-y: 50%;

      --sunpillar-1: hsla(2,   100%, 73%, 1);
      --sunpillar-2: hsla(53,  100%, 69%, 1);
      --sunpillar-3: hsla(93,  100%, 69%, 1);
      --sunpillar-4: hsla(176, 100%, 76%, 1);
      --sunpillar-5: hsla(228, 100%, 74%, 1);
      --sunpillar-6: hsla(283, 100%, 73%, 1);

      display: block;
      break-inside: avoid;
      margin-bottom: 14px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 18px rgba(0,0,0,0.5);
      /* base transform establishes compositing layer upfront so GIFs don't reset */
      transform: perspective(700px) rotateX(0deg) rotateY(0deg) scale(1);
      will-change: transform;
      transition: transform 0.4s ease, box-shadow 0.3s ease;
    }

    .card:hover { z-index: 10; }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Pokemon-cards-151 holo */
    .card__shine {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background-image:
        repeating-linear-gradient(
          0deg,
          var(--sunpillar-1)   0%,
          var(--sunpillar-2)  16.6%,
          var(--sunpillar-3)  33.3%,
          var(--sunpillar-4)  50%,
          var(--sunpillar-5)  66.6%,
          var(--sunpillar-6)  83.3%,
          var(--sunpillar-1) 100%
        ),
        repeating-linear-gradient(
          calc(var(--pointer-from-left) * 90deg + 45deg),
          rgba(255,255,255,0)   0%,
          rgba(255,255,255,0.5) 50%,
          rgba(255,255,255,0)  100%
        );
      background-size: 100% 400%, 200% 200%;
      background-position: 0% var(--shine-y), var(--shine-x) var(--shine-y);
      filter: brightness(1.25) contrast(3) saturate(0.75);
      mix-blend-mode: overlay;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 2;
    }

    .card__glare {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: radial-gradient(
        farthest-corner circle at var(--pointer-x) var(--pointer-y),
        rgba(255,255,255,0.8) 10%,
        rgba(255,255,255,0.4) 45%,
        rgba(0,0,0,0.1) 90%
      );
      mix-blend-mode: overlay;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 3;
    }

    /* CF logos — positions set per-card via inline style */
    .card__logo {
      position: absolute;
      height: auto;
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 4;
      filter: brightness(3) drop-shadow(0 0 8px rgba(255,255,255,0.5));
    }

    .card.is-hovered .card__shine { opacity: 0.72; }
    .card.is-hovered .card__glare { opacity: 0.35; }
    .card.is-hovered .card__logo  { opacity: 0.44; }

    /* Lightbox */
    .giphy-lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .giphy-lightbox.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .giphy-lightbox-inner {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .giphy-lightbox img {
      display: block;
      max-width: 88vw;
      max-height: 86vh;
      width: auto;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.85);
    }
    .giphy-lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.75;
      transition: opacity 0.2s, background 0.2s;
    }
    .giphy-lightbox-close:hover { opacity: 1; background: rgba(255,255,255,0.2); }

  <script>
    var CF_LOGO = 'https://raw.githubusercontent.com/amadcore2099/CFNY/refs/heads/main/images/CF_LOGO_NEW.png';

    var GIPHY_IDS = [
      '7YXyh6XGVrkipoT7AM','Hp0oLlOZbtD6ZbmO79','SCJyPU6loBmTE26VY8','RV4u79GSWJY93Oantt','eC3jZI6okosY6cfEjD',

      'YWCgKvqCgzvePGqVQP','b0KcHRbeA4nmhwTaPL','rwJPJA29xQA8URD1Vd','aKdCLAoT9ZKiLZmloD','INlQJwwoIf4NxVsQTo',
      '4RMIfGvOFaAPLan8gW','ErGUv1zp1zotWhQdoS','vutM9hEltrjxo5nv8J','PPGj667Jf2mpLyheYF','agmtdtCJPnRyY8Ftlh',
      'VHzuQ0lOxvpQieRZSx','D7R9sWPfxru3f96QIa','YrOJbd0RMdTn1iAYfN','ErJzG5Bc20UGazt1Ry','tIuW93NFixReSweOw9',
      'hpKW2LqWwACGRUzzpv','92Fd7I1rlMZinNJNSC','a1KVP0zT3Ki2LG4E7Y','C8bDdb4g2TWmNgCJc5','QwHHU09LmQBmNyF8Yl',
      'iGEXvN1C5T8nqtDXiA','VVGfvI5fnBOVtJo9kc','48SsDaoB6L5V0e3OmG','lAtWoHcji8JF8wA2vf','o1JZOCkGxEqSAdcGwg',
      '8aFeKQWtuj3Wctqmpq','y5hhPp9lcZzdVL0GUV','T0pgtPLAxLrerDbgfe','WfdjcpoM6cAbGtvEf3','Eki04ysaPhCV6EzCVx',
      'm9w4aDfnNlcO8pFdNT','qexkGiFDLCtzRKTKwg','ljVEUxRT309m3iyah3','QVhtLw4SnaxmMdHX7F',
      'r42yUUm087mBZLifKk','mL0ahBPCZeVHNUufxQ','4vMUKxKxjtiwSRGstg','8cZGgp4Yn62QYDLTwf','mxneB06HKsStvWY2Wq','BMkopzVICIDXaHwA34',
      'SASBc01Eda9HhTT1Sq','8o85HC3wNvQfjTO6BH','LPdEzkmMukxnNdaMEW',
      'hK5GmwnR4V7yfmPMBd','3wVKQTtd2vI3DtLPL0'
    ];

    /* ─── 3D GIFs from saadmetla.com/portfolios/3d-gif.html ─── */
    var GIF_BASE = 'https://saadmetla.com/assets/Website/gifs/';
    var PERSONAL_GIFS = [
      'combsstudio5_1.gif','benny_1.gif','conway_1.gif','AP8.gif','georgekas1_1.gif',
      'tdott1_1.gif','smooky1_1.gif','AP6.gif','roxy8_1.gif','rory1_1.gif',
      'tdott2_1.gif','AP17.gif','sheffg_1.gif','migorichwatch1_1.gif','fivio1_1.gif',
      'rory2_1.gif','milfdad_1.gif','AP4.gif','kaylin3d_1.gif','lilmosey1_1.gif',
      'smooky2_1.gif','liltjay_1.gif','lilmosey3b_1.gif','combsstudio1_1.gif','AP25.gif',
      'rich2_1.gif','fetty5_1.gif','chaitanya_1.gif','jaleelgif2_1.gif','madeinny5_1.gif',
      'quavo1_1.gif','offset1%202_1.gif','combsstudio15_1.gif','offset1_1.gif',
      'conway2_1.gif','AP3.gif','conway4_1.gif'
    ];

    /* ─── Rap & Hip-Hop photos from saadmetla.com/portfolios/hip-hop.html ─── */
    var PHOTO_BASE = 'https://saadmetla.com/assets/Website/Photo/Rap%20and%20Hip-Hop/';
    var PHOTOS = [
      'Covers/cover-2.png','NavJosh.jpg','Covers/cover-1.png','capppp.jpg',
      'QuavoHuncho-2.jpg','critchposter2.jpg','richthekid-2.jpg','OGThree.jpg',
      'Olivier%20Cover.jpeg','QuavoHuncho-3.jpg','YRN%20(112%20of%20119).jpg',
      'critch.png','torylanezbb%20(2%20of%2014).jpg','fivio%20(39%20of%2043).jpg',
      'TakeOff.jpg','cappp.jpg','Instant%20Film/ellianteinstax1.jpg','sheffg.jpg',
      'proudofmenow%20(82%20of%20143).jpg','richthekid-6.jpg',
      'Instant%20Film/Instax135010.jpg','YRN%20(30%20of%20119).jpg',
      'Instant%20Film/conwayparty20.jpg','Instant%20Film/DrZeusinstax6.jpg',
      'richthekid.jpg','Covers/covers-3.jpg','richthekid-4.jpg',
      'Instant%20Film/conwayparty7.jpg','fivio%20(32%20of%2043).jpg',
      'QuavoHuncho-7.jpg','rich6-15%20(9%20of%20150).jpg','richthekid-3.jpg',
      'Instant%20Film/conwayparty15.jpg','Instant%20Film/fettyinstax3.jpg',
      'Instant%20Film/sheffg004.jpg','YRN%20(56%20of%20119).jpg',
      'Instant%20Film/conwayparty5.jpg','Instant%20Film/Rich%20(1%20of%201)-3.jpg',
      'Instant%20Film/DrZeusinstax2.jpg'
    ];

    /* ─── Build master URL list ─── */
    var ALL_SRCS = []
      .concat(GIPHY_IDS.map(function(id) { return 'https://media.giphy.com/media/' + id + '/giphy.gif'; }))
      .concat(PERSONAL_GIFS.map(function(f) { return GIF_BASE + f; }))
      .concat(PHOTOS.map(function(f) { return PHOTO_BASE + f; }));

    var grid     = document.getElementById('giphyGrid');
    var lightbox = document.getElementById('giphyLightbox');
    var lbImg    = document.getElementById('giphyLightboxImg');
    var closeBtn = document.getElementById('giphyClose');

    function shuffle(arr) {
      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      }
      return arr;
    }

    /* 6 CF logo scatter positions across the card */
    var SCATTER = [
      { t:  8, l: 14, w: 18, r: -14 },
      { t: 78, l: 80, w: 13, r:  24 },
      { t: 46, l: 50, w: 26, r:   3 },
      { t: 22, l: 76, w: 15, r: -22 },
      { t: 68, l: 18, w: 11, r:  38 },
      { t: 35, l: 88, w: 19, r:  -8 },
    ];

    function buildCard(src) {
      var card = document.createElement('div');
      card.className = 'card';

      var img = document.createElement('img');
      img.src     = src;
      img.alt     = '';
      img.loading = 'lazy';
      img.addEventListener('error', function() { card.style.display = 'none'; });

      var shine = document.createElement('div');
      shine.className = 'card__shine';
      var glare = document.createElement('div');
      glare.className = 'card__glare';

      card.append(img, shine, glare);

      SCATTER.forEach(function(p) {
        var logo = document.createElement('img');
        logo.className = 'card__logo';
        logo.src = CF_LOGO;
        logo.alt = '';
        logo.setAttribute('aria-hidden', 'true');
        logo.style.cssText = 'top:' + p.t + '%;left:' + p.l + '%;width:' + p.w + '%;transform:translate(-50%,-50%) rotate(' + p.r + 'deg);';
        card.appendChild(logo);
      });

      /* 3D tilt — perspective is on the card itself, layer already promoted via will-change */
      card.addEventListener('mousemove', function(e) {
        var r  = card.getBoundingClientRect();
        var fl = (e.clientX - r.left) / r.width;
        var ft = (e.clientY - r.top)  / r.height;

        /* tilt ±18deg — cursor at top-left tilts card toward viewer at top-left */
        var rx = (ft - 0.5) * -18;
        var ry = (fl - 0.5) *  18;

        card.classList.add('is-hovered');
        card.style.transition = 'transform 0.08s ease, box-shadow 0.08s ease';
        card.style.transform  = 'perspective(700px) rotateX(' + rx + 'deg) rotateY(' + ry + 'deg) scale(1.06)';
        card.style.boxShadow  = '0 22px 44px rgba(0,0,0,0.8), 0 0 28px rgba(160,100,255,0.22)';

        card.style.setProperty('--pointer-x',         (e.clientX - r.left) + 'px');
        card.style.setProperty('--pointer-y',         (e.clientY - r.top)  + 'px');
        card.style.setProperty('--pointer-from-left', fl);
        card.style.setProperty('--shine-x',           (fl * 100) + '%');
        card.style.setProperty('--shine-y',           (ft * 100) + '%');
      });

      card.addEventListener('mouseleave', function() {
        card.classList.remove('is-hovered');
        card.style.transition = 'transform 0.45s ease, box-shadow 0.35s ease';
        card.style.transform  = 'perspective(700px) rotateX(0deg) rotateY(0deg) scale(1)';
        card.style.boxShadow  = '';
      });

      card.addEventListener('click', function() { openLightbox(src); });
      return card;
    }

    function openLightbox(src) {
      lbImg.src = src;
      lightbox.classList.add('is-open');
    }

    function closeLightbox() {
      lightbox.classList.remove('is-open');
      setTimeout(function() { lbImg.src = ''; }, 300);
    }

    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function(e) {
      if (!e.target.closest('.giphy-lightbox-inner')) closeLightbox();
    });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });

    /* Shuffle all 141 items and render */
    var frag = document.createDocumentFragment();
    shuffle(ALL_SRCS.slice()).forEach(function(src) { frag.appendChild(buildCard(src)); });
    grid.appendChild(frag);
  </script>
