<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capital Flight — Contact</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body data-page="contact">

  <!-- HEADER (same as your other pages) -->
  <header class="site-header">
	<div class="header-inner">
	  <a class="brand" href="index.html">
		<img class="site-logo"
		  src="https://raw.githubusercontent.com/amadcore2099/CFNY/refs/heads/main/images/CF_LOGO_NEW.png"
		  alt="Capital Flight">
	  </a>

	  <nav class="main-nav">
		<a href="index.html">Home</a>
		<a href="production.html">Production</a>
		<a href="marketing.html">Marketing</a>
		<a href="label.html">Label</a>
		<a href="about.html">About</a>
		<a href="contact.html" aria-current="page">Contact</a>
	  </nav>
	</div>
  </header>

  <!-- PAGE -->
  <main class="page">

	<section class="contact-shell">

	  <div class="contact-intro">
		<br>
		<br>
		<p>
		  Have a project, idea, or collaboration in mind?
		  Let’s build something that travels.
		</p>
	  </div>

	  <!-- FORM -->
	  <form
		class="contact-form"
		action="https://formspree.io/f/YOUR-FORM-ID"
		method="POST"
	  >

		<div class="form-row">
		  <input type="text" name="name" placeholder="Name" required>
		</div>

		<div class="form-row">
		  <input type="email" name="email" placeholder="Email" required>
		</div>

		<div class="form-row">
		  <input type="text" name="company" placeholder="Artist / Brand">
		</div>

		<div class="form-row">
		  <select name="service" required>
			<option value="">Service</option>
			<option>Production</option>
			<option>Marketing</option>
			<option>Label</option>
			<option>Other</option>
		  </select>
		</div>

		<div class="form-row">
		  <textarea name="message" placeholder="Tell us about the project" required></textarea>
		</div>

		<button type="submit" class="form-submit">
		  Send Inquiry
		</button>

	  </form>

	</section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
	<div class="footer-inner">
	  <div class="footer-copy">© Capital Flight New York</div>
	  <div class="footer-socials">
		<!-- keep your SVG icons -->
	  </div>
	</div>
  </footer>

</body>
</html>
