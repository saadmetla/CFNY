  <style>
    .giphy-grid {
      columns: 4;
      column-gap: 14px;
      padding: 0 24px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (max-width: 900px) { .giphy-grid { columns: 3; } }
    @media (max-width: 600px) { .giphy-grid { columns: 2; } }
    @media (max-width: 380px) { .giphy-grid { columns: 1; } }

    /* ── Sunpillar palette (shared by cards + lightbox) ── */
    :root {
      --sp1: hsla(2,   100%, 73%, 1);
      --sp2: hsla(53,  100%, 69%, 1);
      --sp3: hsla(93,  100%, 69%, 1);
      --sp4: hsla(176, 100%, 76%, 1);
      --sp5: hsla(228, 100%, 74%, 1);
      --sp6: hsla(283, 100%, 73%, 1);
    }

    /* ── Grid card ── */
    .card {
      --px: 50%; --py: 50%; --pfl: 0.5; --sx: 50%; --sy: 50%;
      display: block;
      break-inside: avoid;
      margin-bottom: 14px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 18px rgba(0,0,0,0.5);
      transform: perspective(700px) rotateX(0deg) rotateY(0deg) scale(1);
      will-change: transform;
      transition: transform 0.4s ease, box-shadow 0.3s ease;
    }
    .card:hover { z-index: 10; }
    .card img { width: 100%; height: auto; display: block; }

    /* ── Shared holo layers (used on .card and .lb-card) ── */
    .holo-shine {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg,
          var(--sp1) 0%, var(--sp2) 16.6%, var(--sp3) 33.3%,
          var(--sp4) 50%, var(--sp5) 66.6%, var(--sp6) 83.3%, var(--sp1) 100%
        ),
        repeating-linear-gradient(
          calc(var(--pfl, 0.5) * 90deg + 45deg),
          rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%
        );
      background-size: 100% 400%, 200% 200%;
      background-position: 0% var(--sy, 50%), var(--sx, 50%) var(--sy, 50%);
      filter: brightness(0.6) contrast(1.1) saturate(0.5);
      mix-blend-mode: color-dodge;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      border-radius: inherit;
      z-index: 2;
    }
    .holo-glare {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        farthest-corner circle at var(--px, 50%) var(--py, 50%),
        rgba(255,255,255,0.3) 10%, rgba(255,255,255,0.12) 50%, transparent 80%
      );
      mix-blend-mode: overlay;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      border-radius: inherit;
      z-index: 3;
    }

    /* ── CF logo overlay ── */
    .cf-logo {
      position: absolute;
      height: auto;
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 4;
      filter: brightness(3) drop-shadow(0 0 8px rgba(255,255,255,0.5));
    }

    /* Card active state */
    .card.is-hovered .holo-shine { opacity: 0.18; }
    .card.is-hovered .holo-glare { opacity: 0.22; }
    .card.is-hovered .cf-logo   { opacity: 0.35; }

    /* ── Lightbox ── */
    .giphy-lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .giphy-lightbox.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    /* The tiltable holofoil card inside the lightbox */
    .lb-card {
      --px: 50%; --py: 50%; --pfl: 0.5; --sx: 50%; --sy: 50%;
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transform: perspective(900px) rotateX(0deg) rotateY(0deg) scale(1);
      will-change: transform;
      transition: transform 0.45s ease, box-shadow 0.35s ease;
      box-shadow: 0 24px 64px rgba(0,0,0,0.85);
    }
    .lb-card img {
      display: block;
      max-width: 88vw;
      max-height: 82vh;
      width: auto;
      height: auto;
      border-radius: 14px;
    }
    /* Lightbox active holo */
    .lb-card.is-hovered .holo-shine { opacity: 0.2; }
    .lb-card.is-hovered .holo-glare { opacity: 0.25; }
    .lb-card.is-hovered .cf-logo   { opacity: 0.4; }

    .giphy-lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.75;
      transition: opacity 0.2s, background 0.2s;
      z-index: 2001;
    }
    .giphy-lightbox-close:hover { opacity: 1; background: rgba(255,255,255,0.2); }
  </style>

      'QuavoHuncho-2.jpg','critchposter2.jpg','richthekid-2.jpg','OGThree.jpg',

      'critch.png','torylanezbb%20(2%20of%2014).jpg','fivio%20(39%20of%2043).jpg',

      'richthekid.jpg','Covers/covers-3.jpg','richthekid-4.jpg',
      'Instant%20Film/conwayparty7.jpg','fivio%20(32%20of%2043).jpg',
      'QuavoHuncho-7.jpg','rich6-15%20(9%20of%20150).jpg','richthekid-3.jpg',
      'Instant%20Film/conwayparty15.jpg','Instant%20Film/fettyinstax3.jpg',
      'Instant%20Film/sheffg004.jpg','YRN%20(56%20of%20119).jpg',
      'Instant%20Film/conwayparty5.jpg','Instant%20Film/Rich%20(1%20of%201)-3.jpg',
      'Instant%20Film/DrZeusinstax2.jpg'
    ];

    var ALL_SRCS = []
      .concat(GIPHY_IDS.map(function(id) { return 'https://media.giphy.com/media/' + id + '/giphy.gif'; }))
      .concat(PERSONAL_GIFS.map(function(f) { return GIF_BASE + f; }))
      .concat(PHOTOS.map(function(f) { return PHOTO_BASE + f; }));

    var grid     = document.getElementById('giphyGrid');
    var lightbox = document.getElementById('giphyLightbox');
    var lbCard   = document.getElementById('lbCard');
    var lbImg    = document.getElementById('giphyLightboxImg');
    var closeBtn = document.getElementById('giphyClose');

    function shuffle(arr) {
      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      }
      return arr;
    }

    /* Grid positions — fixed 5×7 layout, edges hang off card */
    var LOGO_COLS  = [5, 26, 50, 74, 95];
    var LOGO_ROWS  = [4, 18, 33, 50, 66, 81, 95];
    var LOGO_SIZES = [13, 17, 21, 25, 29];   // pick randomly per logo
    var LOGO_ROTS  = [-14, -9, -4, 0, 4, 9, 14]; // pick randomly per logo

    function rndPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    /* Each call randomises size + rotation independently per logo — every card unique */
    function attachLogos(container) {
      LOGO_ROWS.forEach(function(t) {
        LOGO_COLS.forEach(function(l) {
          var logo = document.createElement('img');
          logo.className = 'cf-logo';
          logo.src = CF_LOGO;
          logo.alt = '';
          logo.setAttribute('aria-hidden', 'true');
          logo.style.cssText =
            'top:'  + t + '%;' +
            'left:' + l + '%;' +
            'width:' + rndPick(LOGO_SIZES) + '%;' +
            'transform:translate(-50%,-50%) rotate(' + rndPick(LOGO_ROTS) + 'deg);';
          container.appendChild(logo);
        });
      });
    }

    /* Apply tilt + holo vars to any element with --px/--py/--pfl/--sx/--sy */
    function applyHolo(el, e) {
      var r  = el.getBoundingClientRect();
      var fl = (e.clientX - r.left) / r.width;
      var ft = (e.clientY - r.top)  / r.height;
      el.style.setProperty('--px',  (e.clientX - r.left) + 'px');
      el.style.setProperty('--py',  (e.clientY - r.top)  + 'px');
      el.style.setProperty('--pfl', fl);
      el.style.setProperty('--sx',  (fl * 100) + '%');
      el.style.setProperty('--sy',  (ft * 100) + '%');
      return { fl: fl, ft: ft };
    }

    /* ── Build a grid card ── */
    function buildCard(src) {
      var card = document.createElement('div');
      card.className = 'card';

      var img = document.createElement('img');
      img.src     = src;
      img.alt     = '';
      img.loading = 'lazy';
      img.addEventListener('error', function() { card.style.display = 'none'; });

      var shine = document.createElement('div');
      shine.className = 'holo-shine';
      var glare = document.createElement('div');
      glare.className = 'holo-glare';

      card.append(img, shine, glare);
      attachLogos(card);

      card.addEventListener('mousemove', function(e) {
        var pos = applyHolo(card, e);
        var rx = (pos.ft - 0.5) * -18;
        var ry = (pos.fl - 0.5) *  18;
        card.classList.add('is-hovered');
        card.style.transition = 'transform 0.08s ease, box-shadow 0.08s ease';
        card.style.transform  = 'perspective(700px) rotateX(' + rx + 'deg) rotateY(' + ry + 'deg) scale(1.06)';
        card.style.boxShadow  = '0 22px 44px rgba(0,0,0,0.8), 0 0 28px rgba(160,100,255,0.22)';
      });

      card.addEventListener('mouseleave', function() {
        card.classList.remove('is-hovered');
        card.style.transition = 'transform 0.45s ease, box-shadow 0.35s ease';
        card.style.transform  = 'perspective(700px) rotateX(0deg) rotateY(0deg) scale(1)';
        card.style.boxShadow  = '';
      });

      card.addEventListener('click', function() { openLightbox(src); });
      return card;
    }

    /* ── Lightbox holo + tilt ── */
    attachLogos(lbCard);

    lbCard.addEventListener('mousemove', function(e) {
      var pos = applyHolo(lbCard, e);
      var rx = (pos.ft - 0.5) * -22;
      var ry = (pos.fl - 0.5) *  22;
      lbCard.classList.add('is-hovered');
      lbCard.style.transition = 'transform 0.08s ease, box-shadow 0.08s ease';
      lbCard.style.transform  = 'perspective(900px) rotateX(' + rx + 'deg) rotateY(' + ry + 'deg) scale(1.02)';
      lbCard.style.boxShadow  = '0 40px 80px rgba(0,0,0,0.9), 0 0 40px rgba(160,100,255,0.35)';
    });

    lbCard.addEventListener('mouseleave', function() {
      lbCard.classList.remove('is-hovered');
      lbCard.style.transition = 'transform 0.5s ease, box-shadow 0.4s ease';
      lbCard.style.transform  = 'perspective(900px) rotateX(0deg) rotateY(0deg) scale(1)';
      lbCard.style.boxShadow  = '0 24px 64px rgba(0,0,0,0.85)';
    });

    function openLightbox(src) {
      lbImg.src = src;
      lightbox.classList.add('is-open');
    }

    function closeLightbox() {
      lightbox.classList.remove('is-open');
      lbCard.classList.remove('is-hovered');
      lbCard.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg) scale(1)';
      setTimeout(function() { lbImg.src = ''; }, 300);
    }

    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });

    /* Render all 141 items */
    var frag = document.createDocumentFragment();
    shuffle(ALL_SRCS.slice()).forEach(function(src) { frag.appendChild(buildCard(src)); });
    grid.appendChild(frag);
  </script>
