  <style>
    /* ── Masonry grid ── */
    .giphy-grid {
      columns: 4;
      column-gap: 14px;
      padding: 0 24px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (max-width: 900px)  { .giphy-grid { columns: 3; } }
    @media (max-width: 600px)  { .giphy-grid { columns: 2; } }
    @media (max-width: 380px)  { .giphy-grid { columns: 1; } }

    /* ── Card — 2D scale grow, GIFs stay animated ── */
    .card {
      --pointer-x: 50%;
      --pointer-y: 50%;
      --pointer-from-left: 0.5;
      --shine-x: 50%;
      --shine-y: 50%;

      --sunpillar-1: hsla(2,   100%, 73%, 1);
      --sunpillar-2: hsla(53,  100%, 69%, 1);
      --sunpillar-3: hsla(93,  100%, 69%, 1);
      --sunpillar-4: hsla(176, 100%, 76%, 1);
      --sunpillar-5: hsla(228, 100%, 74%, 1);
      --sunpillar-6: hsla(283, 100%, 73%, 1);

      display: block;
      break-inside: avoid;
      margin-bottom: 14px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 16px rgba(0,0,0,0.45);
      transition: box-shadow 0.28s ease, transform 0.28s ease;
      transform: scale(1) translateZ(0);
    }

    .card:hover {
      box-shadow: 0 10px 32px rgba(0,0,0,0.7), 0 0 20px rgba(160,100,255,0.14);
      transform: scale(1.05) translateZ(0);
      z-index: 10;
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Pokemon-cards-151 holo ── */
    .card__shine {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background-image:
        repeating-linear-gradient(
          0deg,
          var(--sunpillar-1)   0%,
          var(--sunpillar-2)  16.6%,
          var(--sunpillar-3)  33.3%,
          var(--sunpillar-4)  50%,
          var(--sunpillar-5)  66.6%,
          var(--sunpillar-6)  83.3%,
          var(--sunpillar-1) 100%
        ),
        repeating-linear-gradient(
          calc(var(--pointer-from-left) * 90deg + 45deg),
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.5) 50%,
          rgba(255,255,255,0) 100%
        );
      background-size: 100% 400%, 200% 200%;
      background-position: 0% var(--shine-y), var(--shine-x) var(--shine-y);
      filter: brightness(1.25) contrast(3) saturate(0.75);
      mix-blend-mode: overlay;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 2;
    }

    .card__glare {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: radial-gradient(
        farthest-corner circle at var(--pointer-x) var(--pointer-y),
        rgba(255,255,255,0.8) 10%,
        rgba(255,255,255,0.4) 45%,
        rgba(0,0,0,0.1) 90%
      );
      mix-blend-mode: overlay;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 3;
    }

    /* ── CF logos — scattered, positions set via inline style ── */
    .card__logo {
      position: absolute;
      height: auto;
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 4;
      filter: brightness(3) drop-shadow(0 0 6px rgba(255,255,255,0.4));
    }

    .card:hover .card__shine { opacity: 0.72; }
    .card:hover .card__glare { opacity: 0.35; }
    .card:hover .card__logo  { opacity: 0.42; }

    /* ── Lightbox ── */
    .giphy-lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .giphy-lightbox.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .giphy-lightbox-inner {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .giphy-lightbox img {
      display: block;
      max-width: 88vw;
      max-height: 86vh;
      width: auto;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.85);
    }
    .giphy-lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      color: #fff;
      font-size: 18px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0.75;
      transition: opacity 0.2s, background 0.2s;
    }
    .giphy-lightbox-close:hover {
      opacity: 1;
      background: rgba(255,255,255,0.18);
    }
  </style>

  <script>
    const CF_LOGO = 'https://raw.githubusercontent.com/amadcore2099/CFNY/refs/heads/main/images/CF_LOGO_NEW.png';

    // All 65 @saadmetla GIFs — hardcoded direct CDN, no API key needed
    const GIF_IDS = [
      '7YXyh6XGVrkipoT7AM','Hp0oLlOZbtD6ZbmO79','SCJyPU6loBmTE26VY8','RV4u79GSWJY93Oantt','eC3jZI6okosY6cfEjD',
      'wMIKzT6umGX0x9pu9B','Ufwem8bDVmtTH55tnU','f2RMUe8TJdbAKHuD3O','vnzV73oztE0tSgy9sf','F5q2vJ3QnhPWEYUKM7',
      'JCuwTjKdxPDD3VJ1rT','ps7KaGq7DQ15csS6XL','mh2GAoc0IqHklln8Wu','eSZ0KK05JWdNSk5WWC','X8A77knU6m8bKU4D7Q',
      'urdJikxhonENmjfW5D','YDP0zAVeUP2nVqPrsp','RMa2XHZurr7OyQnSsJ','EtxJUiWzJpReXbOZke','MQ8tvpzEgBKhsv1IR6',
      'YWCgKvqCgzvePGqVQP','b0KcHRbeA4nmhwTaPL','rwJPJA29xQA8URD1Vd','aKdCLAoT9ZKiLZmloD','INlQJwwoIf4NxVsQTo',
      '4RMIfGvOFaAPLan8gW','ErGUv1zp1zotWhQdoS','vutM9hEltrjxo5nv8J','PPGj667Jf2mpLyheYF','agmtdtCJPnRyY8Ftlh',
      'VHzuQ0lOxvpQieRZSx','D7R9sWPfxru3f96QIa','YrOJbd0RMdTn1iAYfN','ErJzG5Bc20UGazt1Ry','tIuW93NFixReSweOw9',
      'hpKW2LqWwACGRUzzpv','92Fd7I1rlMZinNJNSC','a1KVP0zT3Ki2LG4E7Y','C8bDdb4g2TWmNgCJc5','QwHHU09LmQBmNyF8Yl',
      'iGEXvN1C5T8nqtDXiA','VVGfvI5fnBOVtJo9kc','48SsDaoB6L5V0e3OmG','lAtWoHcji8JF8wA2vf','o1JZOCkGxEqSAdcGwg',
      '8aFeKQWtuj3Wctqmpq','y5hhPp9lcZzdVL0GUV','T0pgtPLAxLrerDbgfe','WfdjcpoM6cAbGtvEf3','Eki04ysaPhCV6EzCVx',
      'm9w4aDfnNlcO8pFdNT','qexkGiFDLCtzRKTKwg','ljVEUxRT309m3iyah3','QVhtLw4SnaxmMdHX7F',
      'r42yUUm087mBZLifKk','mL0ahBPCZeVHNUufxQ','4vMUKxKxjtiwSRGstg','8cZGgp4Yn62QYDLTwf','mxneB06HKsStvWY2Wq','BMkopzVICIDXaHwA34',
      'SASBc01Eda9HhTT1Sq','8o85HC3wNvQfjTO6BH','LPdEzkmMukxnNdaMEW',
      'hK5GmwnR4V7yfmPMBd','3wVKQTtd2vI3DtLPL0'
    ];

    const grid     = document.getElementById('giphyGrid');
    const lightbox = document.getElementById('giphyLightbox');
    const lbImg    = document.getElementById('giphyLightboxImg');
    const closeBtn = document.getElementById('giphyClose');

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const SCATTER = [
      { t: 14, l: 22, w: 20, r: -12 },
      { t: 70, l: 74, w: 15, r:  20 },
      { t: 46, l: 54, w: 26, r:   5 },
    ];

    function buildCard(id) {
      const src  = 'https://media.giphy.com/media/' + id + '/giphy.gif';
      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.src     = src;
      img.alt     = '';
      img.loading = 'lazy';

      const shine = document.createElement('div');
      shine.className = 'card__shine';
      const glare = document.createElement('div');
      glare.className = 'card__glare';

      card.append(img, shine, glare);

      SCATTER.forEach(function(p) {
        const logo = document.createElement('img');
        logo.className = 'card__logo';
        logo.src = CF_LOGO;
        logo.alt = '';
        logo.setAttribute('aria-hidden', 'true');
        logo.style.cssText = 'top:' + p.t + '%;left:' + p.l + '%;width:' + p.w + '%;transform:translate(-50%,-50%) rotate(' + p.r + 'deg);';
        card.appendChild(logo);
      });

      card.addEventListener('mousemove', function(e) {
        const r  = card.getBoundingClientRect();
        const fl = (e.clientX - r.left) / r.width;
        const ft = (e.clientY - r.top)  / r.height;
        card.style.setProperty('--pointer-x',         (e.clientX - r.left) + 'px');
        card.style.setProperty('--pointer-y',         (e.clientY - r.top)  + 'px');
        card.style.setProperty('--pointer-from-left', fl);
        card.style.setProperty('--shine-x',           (fl * 100) + '%');
        card.style.setProperty('--shine-y',           (ft * 100) + '%');
      });

      card.addEventListener('click', function() { openLightbox(src); });
      return card;
    }

    function openLightbox(src) {
      lbImg.src = src;
      lightbox.classList.add('is-open');
    }

    function closeLightbox() {
      lightbox.classList.remove('is-open');
      setTimeout(function() { lbImg.src = ''; }, 300);
    }

    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function(e) {
      if (!e.target.closest('.giphy-lightbox-inner')) closeLightbox();
    });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });

    // Render instantly — no API call, no wait
    var frag = document.createDocumentFragment();
    shuffle(GIF_IDS.slice()).forEach(function(id) { frag.appendChild(buildCard(id)); });
    grid.appendChild(frag);
  </script>
