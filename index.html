<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capital Flight NY</title>
  <style>
	html, body {
	  margin: 0;
	  height: 100%;
	  overflow: hidden;
	  background: #000;
	  font-family: Arial, Helvetica, sans-serif;
	}

	* {
	  box-sizing: border-box;
	}

	:root {
	  --logo-width: 340px;
	  --panel-shadow: 0 18px 50px rgba(0,0,0,.45);
	  --wire: rgba(255,255,255,.18);
	  --wire-soft: rgba(255,255,255,.08);
	}

	.scene {
	  position: relative;
	  width: 100vw;
	  height: 100vh;
	  overflow: hidden;
	  background: #000;
	}

	/* =========================
	   BG VIDEO
	========================= */
	.bg-video-wrap {
	  position: absolute;
	  inset: 0;
	  overflow: hidden;
	  z-index: 0;
	  background: #000;
	}

	.bg-video-wrap iframe {
	  position: absolute;
	  top: 50%;
	  left: 50%;
	  width: 177.77777778vh;
	  height: 56.25vw;
	  min-width: 100vw;
	  min-height: 100vh;
	  transform: translate(-50%, -50%) scale(1.15);
	  pointer-events: none;
	  border: 0;
	  opacity: .42;
	  filter: contrast(1.05) brightness(.55) saturate(.85);
	}

	/* =========================
	   STAR CANVAS (animated)
	========================= */
	#starCanvas {
	  position: absolute;
	  inset: 0;
	  z-index: 1;
	  pointer-events: none;
	}

	.vignette {
	  position: absolute;
	  inset: 0;
	  z-index: 2;
	  pointer-events: none;
	  background:
		radial-gradient(circle at center, transparent 38%, rgba(0,0,0,.15) 58%, rgba(0,0,0,.5) 100%);
	}

	/* =========================
	   3D STAGE
	========================= */
	.tunnel-stage {
	  position: absolute;
	  inset: 0;
	  z-index: 3;
	  perspective: 1200px;
	  perspective-origin: 50% 50%;
	  transform-style: preserve-3d;
	}

	.wire-room {
	  position: absolute;
	  inset: 0;
	  transform-style: preserve-3d;
	}

	.wire-grid {
	  position: absolute;
	  inset: 0;
	  pointer-events: none;
	  opacity: .85;
	}

	.wire-grid.floor {
	  transform: rotateX(90deg) translateZ(-200px);
	  transform-origin: center center;
	  background-image:
		linear-gradient(to right, rgba(255,255,255,.18) 1px, transparent 1px),
		linear-gradient(to bottom, rgba(255,255,255,.18) 1px, transparent 1px);
	  background-size: 80px 80px;
	}

	.wire-grid.ceiling {
	  transform: rotateX(90deg) translateZ(200px);
	  transform-origin: center center;
	  background-image:
		linear-gradient(to right, rgba(255,255,255,.14) 1px, transparent 1px),
		linear-gradient(to bottom, rgba(255,255,255,.14) 1px, transparent 1px);
	  background-size: 80px 80px;
	}

	.wire-grid.back {
	  inset: 10% 12%;
	  border: 1px solid rgba(255,255,255,.22);
	  background-image:
		linear-gradient(to right, rgba(255,255,255,.13) 1px, transparent 1px),
		linear-gradient(to bottom, rgba(255,255,255,.13) 1px, transparent 1px);
	  background-size: 88px 88px;
	}

	.wire-grid.left-wall {
	  top: 0; bottom: 0; left: 0; width: 20%;
	  transform-origin: left center;
	  transform: rotateY(-90deg);
	  background-image:
		linear-gradient(to right, rgba(255,255,255,.12) 1px, transparent 1px),
		linear-gradient(to bottom, rgba(255,255,255,.12) 1px, transparent 1px);
	  background-size: 80px 80px;
	}

	.wire-grid.right-wall {
	  top: 0; bottom: 0; right: 0; width: 20%;
	  transform-origin: right center;
	  transform: rotateY(90deg);
	  background-image:
		linear-gradient(to right, rgba(255,255,255,.12) 1px, transparent 1px),
		linear-gradient(to bottom, rgba(255,255,255,.12) 1px, transparent 1px);
	  background-size: 80px 80px;
	}

	.wire-frame {
	  position: absolute;
	  left: 50%;
	  top: 50%;
	  border: 1px solid rgba(255,255,255,.14);
	  transform: translate(-50%, -50%);
	  pointer-events: none;
	}

	.depth-lines {
	  position: absolute;
	  inset: 0;
	  pointer-events: none;
	}

	.depth-lines span {
	  position: absolute;
	  background: rgba(255,255,255,.12);
	  transform-origin: top left;
	}

	/* =========================
	   FLOATING PANELS
	========================= */
	.media-field {
	  position: absolute;
	  inset: 0;
	  transform-style: preserve-3d;
	  z-index: 4;
	}

	.media-card {
	  position: absolute;
	  transform-style: preserve-3d;
	  box-shadow: var(--panel-shadow);
	  overflow: hidden;
	  background: #050505;
	  border: 1px solid rgba(255,255,255,.06);
	  will-change: transform;
	  cursor: grab;
	  display: block;
	  text-decoration: none;
	  transition: border-color .2s ease, box-shadow .2s ease;
	  user-select: none;
	}
	.media-card.dragging {
	  cursor: grabbing;
	  border-color: rgba(255,255,255,.3);
	  box-shadow: var(--panel-shadow), 0 0 0 1px rgba(255,255,255,.18), 0 0 40px rgba(255,255,255,.06);
	}

	.media-card:hover {
	  border-color: rgba(255,255,255,.24);
	  box-shadow: var(--panel-shadow), 0 0 0 1px rgba(255,255,255,.14);
	}

	.media-card img,
	.media-card video {
	  display: block;
	  width: 100%;
	  height: 100%;
	  object-fit: cover;
	  pointer-events: none;
	}

	/* play-hint on hover */
	.media-card::after {
	  content: '▶';
	  position: absolute;
	  inset: 0;
	  display: flex;
	  align-items: center;
	  justify-content: center;
	  font-size: 28px;
	  color: rgba(255,255,255,.9);
	  background: rgba(0,0,0,0);
	  opacity: 0;
	  transition: opacity .2s ease, background .2s ease;
	  display: grid;
	  place-items: center;
	}
	.media-card:hover::after {
	  opacity: 1;
	  background: rgba(0,0,0,.3);
	}

	/* =========================
	   CENTER BRAND
	========================= */
	.center-brand {
	  position: absolute;
	  left: 50%;
	  top: 50%;
	  z-index: 6;
	  transform: translate(-50%, -50%);
	  display: flex;
	  flex-direction: column;
	  align-items: center;
	  gap: 12px;
	  text-align: center;
	  opacity: 0;
	  transition: opacity .9s ease .5s;
	}
	.center-brand.visible { opacity: 1; }

	.center-brand .brand-logo {
	  width: min(var(--logo-width), 52vw);
	  max-width: 100%;
	  filter: drop-shadow(0 8px 28px rgba(0,0,0,.7));
	  transition: transform .22s ease, filter .22s ease;
	  cursor: pointer;
	  display: block;
	}
	.center-brand .brand-logo:hover {
	  transform: scale(1.07);
	  filter: drop-shadow(0 12px 36px rgba(0,0,0,.8)) brightness(1.08);
	}

	.cta-row {
	  display: flex;
	  align-items: center;
	  gap: 10px;
	  flex-wrap: wrap;
	  justify-content: center;
	}

	/* Primary CTA */
	.btn-primary {
	  display: inline-block;
	  text-decoration: none;
	  border-radius: 999px;
	  padding: 10px 28px 11px;
	  background: rgba(200,202,208,.92);
	  color: #0c0c0c;
	  font-family: Arial, Helvetica, sans-serif;
	  font-weight: 800;
	  letter-spacing: .12em;
	  font-size: clamp(11px, 1.1vw, 13px);
	  text-transform: uppercase;
	  box-shadow: 0 6px 20px rgba(0,0,0,.5);
	  transition: transform .18s ease, filter .18s ease, box-shadow .18s ease, background .18s ease;
	  border: 1px solid rgba(255,255,255,.25);
	}
	.btn-primary:hover {
	  transform: translateY(-3px) scale(1.05);
	  filter: brightness(1.08);
	  box-shadow: 0 12px 30px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.3);
	  background: rgba(220,222,228,1);
	}

	/* Secondary CTA */
	.btn-secondary {
	  display: inline-block;
	  text-decoration: none;
	  border-radius: 999px;
	  padding: 9px 24px 10px;
	  background: transparent;
	  color: rgba(255,255,255,.85);
	  border: 1px solid rgba(255,255,255,.35);
	  font-family: Arial, Helvetica, sans-serif;
	  font-weight: 700;
	  letter-spacing: .12em;
	  font-size: clamp(11px, 1.1vw, 13px);
	  text-transform: uppercase;
	  transition: transform .18s ease, border-color .18s ease, color .18s ease, background .18s ease, box-shadow .18s ease;
	}
	.btn-secondary:hover {
	  transform: translateY(-3px) scale(1.04);
	  border-color: rgba(255,255,255,.7);
	  color: #fff;
	  background: rgba(255,255,255,.06);
	  box-shadow: 0 8px 24px rgba(0,0,0,.4);
	}

	/* opacity controlled by JS warp-in; hover transitions only */
	.media-card {
	  opacity: 0;
	  transition: border-color .2s ease, box-shadow .2s ease;
	}

	/* =========================
	   SOCIAL / ICONS
	========================= */
	.floating-icon {
	  position: absolute;
	  z-index: 6;
	  user-select: none;
	  display: block;
	  transition: transform .22s ease, filter .22s ease;
	}

	.floating-icon img {
	  display: block;
	  width: 100%;
	  height: auto;
	}

	/* Instagram — bottom left, large, like reference */
	.icon-instagram {
	  left: 7%;
	  bottom: 20%;
	  width: clamp(72px, 8vw, 130px);
	  transform: rotate(-6deg);
	  filter: drop-shadow(0 16px 32px rgba(0,0,0,.6));
	}
	.icon-instagram:hover {
	  transform: rotate(-6deg) scale(1.1) translateY(-4px);
	  filter: drop-shadow(0 20px 40px rgba(0,0,0,.7)) brightness(1.08);
	}

	/* YouTube — right side, large red logo, like reference */
	.icon-youtube {
	  right: 8%;
	  top: 32%;
	  width: clamp(72px, 7.5vw, 120px);
	  transform: rotate(3deg);
	  filter: drop-shadow(0 16px 32px rgba(0,0,0,.6));
	}
	.icon-youtube:hover {
	  transform: rotate(3deg) scale(1.1) translateY(-4px);
	  filter: drop-shadow(0 20px 40px rgba(0,0,0,.7)) brightness(1.1);
	}

	.scanlines {
	  position: absolute;
	  inset: 0;
	  z-index: 7;
	  pointer-events: none;
	  background:
		linear-gradient(to bottom, rgba(255,255,255,.035), rgba(255,255,255,0) 2px);
	  background-size: 100% 4px;
	  opacity: .18;
	  mix-blend-mode: soft-light;
	}

	.hud-rail {
	  position: absolute;
	  top: 0;
	  right: 0;
	  height: 100%;
	  width: 34px;
	  z-index: 7;
	  color: rgba(255,255,255,.75);
	  font-size: 12px;
	  letter-spacing: .2em;
	  display: flex;
	  flex-direction: column;
	  align-items: center;
	  justify-content: center;
	  writing-mode: vertical-rl;
	  text-transform: uppercase;
	  opacity: .7;
	  pointer-events: none;
	}

	@media (max-width: 900px) {
	  :root { --logo-width: 240px; }
	  .bg-video-wrap iframe { transform: translate(-50%, -50%) scale(1.35); }
	  .icon-instagram { left: 4%; bottom: 18%; }
	  .icon-youtube   { right: 4%; top: 34%; }
	}

	@media (max-width: 600px) {
	  :root { --logo-width: 200px; }
	  .hud-rail { display: none; }
	  .icon-instagram { width: clamp(52px, 10vw, 80px); }
	  .icon-youtube   { width: clamp(52px, 10vw, 80px); }
	}
  </style>
</head>
<body>
  <div class="scene">

	<!-- background video — swap video ID to whichever CF video you want behind the tunnel -->
	<div class="bg-video-wrap">
	  <iframe
		src="https://www.youtube.com/embed/UNOmaFs6KaY?autoplay=1&mute=1&controls=0&loop=1&playlist=UNOmaFs6KaY&playsinline=1&modestbranding=1&rel=0"
		title="Background video"
		allow="autoplay; encrypted-media; picture-in-picture"
		referrerpolicy="strict-origin-when-cross-origin"
	  ></iframe>
	</div>

	<!-- animated star canvas -->
	<canvas id="starCanvas"></canvas>

	<div class="vignette"></div>

	<div class="tunnel-stage">
	  <div class="wire-room">
		<div class="wire-grid floor"></div>
		<div class="wire-grid ceiling"></div>
		<div class="wire-grid back"></div>
		<div class="wire-grid left-wall"></div>
		<div class="wire-grid right-wall"></div>

		<div class="depth-lines" id="depthLines"></div>

		<div class="wire-frame" style="width:72vw;height:58vh;"></div>
		<div class="wire-frame" style="width:56vw;height:44vh;"></div>
		<div class="wire-frame" style="width:42vw;height:32vh;"></div>
		<div class="wire-frame" style="width:30vw;height:22vh;"></div>
		<div class="wire-frame" style="width:20vw;height:15vh;"></div>

		<div class="media-field" id="mediaField"></div>
	  </div>
	</div>

	<!-- social icons -->
	<a href="https://www.instagram.com/capitalflightny/"
	   class="floating-icon icon-instagram"
	   target="_blank" rel="noopener" aria-label="Instagram">
	  <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram">
	</a>

	<a href="https://www.youtube.com/@CapitalFlightNY"
	   class="floating-icon icon-youtube"
	   target="_blank" rel="noopener" aria-label="YouTube">
	  <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube">
	</a>

	<div class="center-brand" id="centerBrand">
	  <img
		class="brand-logo"
		src="https://raw.githubusercontent.com/amadcore2099/CFNY/refs/heads/main/images/CF_LOGO_NEW.png"
		alt="Capital Flight NY"
	  >
	  <div class="cta-row">
		<a href="contact.html"    class="btn-primary">Work With Us</a>
		<a href="production.html" class="btn-secondary">View Our Work</a>
	  </div>
	</div>

	<div class="scanlines"></div>
	<div class="hud-rail">Capital Flight</div>
  </div>

  <script>
	/* =============================================
	   ANIMATED STAR CANVAS
	============================================= */
	(function () {
	  const canvas = document.getElementById('starCanvas');
	  const ctx    = canvas.getContext('2d');
	  let W, H, stars = [];
	  const DPR = Math.min(window.devicePixelRatio || 1, 2);

	  function resize() {
		W = window.innerWidth;
		H = window.innerHeight;
		canvas.width  = W * DPR;
		canvas.height = H * DPR;
		canvas.style.width  = W + 'px';
		canvas.style.height = H + 'px';
		ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
		init();
	  }

	  function init() {
		const n = Math.min(350, Math.floor(W * H / 3400));
		stars = Array.from({ length: n }, () => ({
		  x: Math.random() * W,
		  y: Math.random() * H,
		  r: Math.random() * 1.2 + 0.2,
		  base: Math.random() * 0.4 + 0.15,
		  amp:  Math.random() * 0.5 + 0.1,
		  freq: Math.random() * 1.5 + 0.3,
		  phase: Math.random() * Math.PI * 2,
		  vx: (Math.random() - 0.5) * 0.01,
		  vy: (Math.random() - 0.5) * 0.01,
		}));
	  }

	  let last = 0;
	  function draw(ts) {
		const dt = Math.min((ts - last) * 0.001, 0.05);
		last = ts;
		ctx.clearRect(0, 0, W, H);
		for (const s of stars) {
		  s.phase += s.freq * dt;
		  s.x = (s.x + s.vx + W) % W;
		  s.y = (s.y + s.vy + H) % H;
		  const a = Math.max(0, s.base + s.amp * Math.sin(s.phase));
		  ctx.beginPath();
		  ctx.arc(s.x, s.y, s.r, 0, 6.2832);
		  ctx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;
		  ctx.fill();
		}
		requestAnimationFrame(draw);
	  }

	  window.addEventListener('resize', () => {
		ctx.setTransform(1, 0, 0, 1, 0, 0);
		resize();
	  }, { passive: true });
	  resize();
	  requestAnimationFrame(draw);
	})();


	/* =============================================
	   MEDIA CARDS
	   Same positions as reference splash.
	   type:'video' → local mp4 autoplay
	   type:'image' → YT thumbnail or local JPG
	   link → click destination
	============================================= */

	const YTL = id => `https://www.youtube.com/watch?v=${id}`;

	// 3D ROOM layout: LEFT WALL | CEILING | RIGHT WALL | FLOOR
	const mediaItems = [
	  // ── LEFT WALL (ry positive = card faces right toward center) ──
	  { type:'video', src:'videos/ashanti.mp4',     link: YTL('_j55M6SC8Pw'),
	    x:5,  y:28, z:180, w:430, h:242, rx:0,  ry:36,  rz:0  },
	  { type:'video', src:'videos/chani.mp4',        link: YTL('jMqIpCddv7s'),
	    x:16, y:47, z:110, w:300, h:169, rx:0,  ry:26,  rz:-1 },
	  { type:'video', src:'videos/shimmy.mp4',       link: YTL('iCCYnAwPcvI'),
	    x:24, y:53, z:75,  w:240, h:135, rx:0,  ry:20,  rz:0  },

	  // ── CEILING (rx negative = card tilts top away / lies on ceiling) ──
	  { type:'video', src:'videos/pooja.mp4',        link: YTL('C0dv7kjX1Sk'),
	    x:31, y:7,  z:170, w:310, h:174, rx:-40, ry:8,  rz:0  },
	  { type:'video', src:'videos/esko.mp4',         link: YTL('WeCos4aCC60'),
	    x:46, y:4,  z:150, w:280, h:157, rx:-38, ry:-2, rz:0  },
	  { type:'video', src:'videos/heems.mp4',        link: YTL('3d_cGjvZNTA'),
	    x:63, y:6,  z:160, w:300, h:169, rx:-36, ry:-10,rz:0  },

	  // ── RIGHT WALL (ry negative = card faces left toward center) ──
	  { type:'video', src:'videos/otr-raf.mp4',      link: YTL('DnBZ-QRVg0Q'),
	    x:90, y:22, z:190, w:450, h:253, rx:0,  ry:-38, rz:0  },
	  { type:'video', src:'videos/otr-rico.mp4',     link: YTL('f0ogsEtb0IY'),
	    x:75, y:36, z:115, w:300, h:169, rx:0,  ry:-28, rz:0  },
	  { type:'video', src:'videos/raf.mp4',           link: YTL('MwFC7trjEXM'),
	    x:84, y:57, z:90,  w:370, h:208, rx:0,  ry:-33, rz:0  },

	  // ── FLOOR (rx positive = card lies flat on floor) ──
	  { type:'video', src:'videos/esko-annural.mp4', link: YTL('cC47jPDezss'),
	    x:47, y:73, z:130, w:340, h:191, rx:64, ry:0,   rz:0  },
	  { type:'video', src:'videos/otr-sammy.mp4',    link: YTL('sAHFb_rgcFQ'),
	    x:63, y:76, z:110, w:290, h:163, rx:60, ry:-12, rz:0  },
	  { type:'video', src:'videos/otr-chani.mp4',    link: YTL('Tjc6sgmFi6Q'),
	    x:26, y:78, z:100, w:310, h:174, rx:62, ry:16,  rz:0  },
	];

	const field = document.getElementById('mediaField');

	function renderMedia() {
	  field.innerHTML = '';

	  mediaItems.forEach((item, i) => {
		const el = document.createElement('a');
		el.className = 'media-card';
		el.href = item.link;
		if (item.link.startsWith('http')) {
		  el.target = '_blank';
		  el.rel = 'noopener noreferrer';
		}
		el.style.left   = `${item.x}%`;
		el.style.top    = `${item.y}%`;
		el.style.width  = `${item.w}px`;
		el.style.height = `${item.h}px`;
		el.style.transform = cardTf(item, 0, 0);

		if (item.type === 'video') {
		  el.innerHTML = `<video src="${item.src}" autoplay muted loop playsinline preload="metadata"></video>`;
		} else {
		  el.innerHTML = `<img src="${item.src}" alt="" loading="lazy">`;
		}

		el.dataset.z  = item.z;
		el.dataset.rx = item.rx;
		el.dataset.ry = item.ry;
		el.dataset.rz = item.rz;

		field.appendChild(el);
	  });
	}

	function cardTf(item, dz, dtilt) {
	  const z  = +item.z  + dz;
	  const rx = +item.rx + dtilt;
	  return `translate3d(-50%,-50%,${z}px) rotateX(${rx}deg) rotateY(${item.ry}deg) rotateZ(${item.rz}deg)`;
	}

	function buildDepthLines() {
	  const wrap = document.getElementById('depthLines');
	  const points = [
		['12%','12%','50%','50%'],
		['88%','12%','50%','50%'],
		['12%','88%','50%','50%'],
		['88%','88%','50%','50%'],
		['24%','6%','50%','50%'],
		['94%','26%','50%','50%'],
		['6%','70%','50%','50%'],
		['82%','94%','50%','50%'],
	  ];

	  points.forEach(([x1,y1,x2,y2]) => {
		const line = document.createElement('span');
		const ax = parseFloat(x1), ay = parseFloat(y1);
		const bx = parseFloat(x2), by = parseFloat(y2);
		const dx = bx - ax, dy = by - ay;
		const len = Math.sqrt(dx*dx + dy*dy);
		const ang = Math.atan2(dy,dx) * 180 / Math.PI;
		line.style.left      = x1;
		line.style.top       = y1;
		line.style.width     = `${len}%`;
		line.style.height    = '1px';
		line.style.transform = `rotate(${ang}deg)`;
		wrap.appendChild(line);
	  });
	}

	renderMedia();
	buildDepthLines();

	/* ── Drag to reposition cards ── */
	let dragState = null;

	field.addEventListener('mousedown', onDragStart);
	field.addEventListener('touchstart', onDragStart, { passive: false });
	window.addEventListener('mousemove', onDragMove, { passive: false });
	window.addEventListener('touchmove', onDragMove, { passive: false });
	window.addEventListener('mouseup', onDragEnd);
	window.addEventListener('touchend', onDragEnd);

	function onDragStart(e) {
	  const card = e.target.closest('.media-card');
	  if (!card) return;
	  e.preventDefault();
	  const pt = e.touches ? e.touches[0] : e;
	  dragState = {
	    card,
	    startX:    pt.clientX,
	    startY:    pt.clientY,
	    startLeft: parseFloat(card.style.left),
	    startTop:  parseFloat(card.style.top),
	    moved:     false,
	  };
	  card.classList.add('dragging');
	  document.body.style.cursor = 'grabbing';
	}

	function onDragMove(e) {
	  if (!dragState) return;
	  e.preventDefault();
	  const pt = e.touches ? e.touches[0] : e;
	  const dx = pt.clientX - dragState.startX;
	  const dy = pt.clientY - dragState.startY;
	  if (Math.abs(dx) > 4 || Math.abs(dy) > 4) dragState.moved = true;
	  dragState.card.style.left = (dragState.startLeft + (dx / window.innerWidth)  * 100) + '%';
	  dragState.card.style.top  = (dragState.startTop  + (dy / window.innerHeight) * 100) + '%';
	}

	function onDragEnd(e) {
	  if (!dragState) return;
	  dragState.card.classList.remove('dragging');
	  document.body.style.cursor = '';
	  if (dragState.moved) {
	    dragState.card.addEventListener('click', ev => ev.preventDefault(), { once: true });
	  }
	  dragState = null;
	}

	/* Center brand entrance */
	setTimeout(() => document.getElementById('centerBrand').classList.add('visible'), 700);

	/* ── Mouse parallax ── */
	const stage = document.querySelector('.tunnel-stage');
	let targetPX = 50, targetPY = 50, curPX = 50, curPY = 50;
	let targetMX = 0, targetMY = 0, curMX = 0, curMY = 0;

	document.addEventListener('mousemove', e => {
	  targetPX = 50 + (e.clientX / window.innerWidth  - 0.5) * 7;
	  targetPY = 50 + (e.clientY / window.innerHeight - 0.5) * 7;
	  targetMX = (e.clientX / window.innerWidth  - 0.5) * 2;
	  targetMY = (e.clientY / window.innerHeight - 0.5) * 2;
	}, { passive: true });

	/* ── Warp-in + float animation ── */
	const WARP_DUR     = 950;   // ms per card animation
	const WARP_STAGGER = 110;   // ms between cards
	const WARP_DELAY   = 150;   // ms before first card starts
	const pageStart    = performance.now();

	let t = 0;
	function animate() {
	  t += 0.01;
	  const now = performance.now();

	  /* smooth parallax */
	  curPX += (targetPX - curPX) * 0.04;
	  curPY += (targetPY - curPY) * 0.04;
	  stage.style.perspectiveOrigin = `${curPX}% ${curPY}%`;

	  curMX += (targetMX - curMX) * 0.05;
	  curMY += (targetMY - curMY) * 0.05;

	  document.querySelectorAll('.media-card').forEach((card, i) => {
		const z  = parseFloat(card.dataset.z);
		const rx = parseFloat(card.dataset.rx);
		const ry = parseFloat(card.dataset.ry);
		const rz = parseFloat(card.dataset.rz);

		const elapsed  = now - pageStart - WARP_DELAY - i * WARP_STAGGER;
		const raw      = Math.max(0, Math.min(1, elapsed / WARP_DUR));
		const progress = 1 - Math.pow(1 - raw, 3); // ease-out cubic

		if (raw < 1) {
		  /* ── WARP-IN PHASE ── */
		  const warpZ   = (z - 600) + progress * 600;
		  const opacity = progress;
		  const scale   = 0.15 + progress * 0.85;
		  card.style.opacity   = opacity.toFixed(3);
		  card.style.transform =
		    `translate3d(-50%,-50%,${warpZ.toFixed(1)}px) ` +
		    `rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg) ` +
		    `scale(${scale.toFixed(3)})`;
		} else {
		  /* ── FLOAT PHASE ── */
		  const offset = Math.sin(t + i * 0.55) * 6;
		  const tilt   = Math.cos(t * 0.8 + i * 0.4) * 1.5;
		  const depth  = z / 280;
		  const px     = curMX * depth * 16;
		  const py     = curMY * depth * 11;
		  card.style.opacity   = '1';
		  card.style.transform =
		    `translate3d(calc(-50% + ${px}px),calc(-50% + ${py}px),${(z + offset).toFixed(1)}px) ` +
		    `rotateX(${(rx + tilt + curMY * 2).toFixed(2)}deg) ` +
		    `rotateY(${(ry + curMX * 4).toFixed(2)}deg) ` +
		    `rotateZ(${rz}deg)`;
		}
	  });
	  requestAnimationFrame(animate);
	}
	animate();
  </script>
</body>
</html>
