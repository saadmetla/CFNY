<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capital Flight — Contact</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body data-page="contact">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="https://cfny.framer.website/" aria-label="Capital Flight home">
        <img class="site-logo"
          src="https://raw.githubusercontent.com/amadcore2099/CFNY/refs/heads/main/images/CF_LOGO_NEW.png"
          alt="Capital Flight">
      </a>

      <button
        class="menu-toggle"
        id="menuToggle"
        aria-label="Open menu"
        aria-expanded="false"
        aria-controls="mobileMenu"
        type="button"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" aria-label="Main navigation">
        <a href="https://cfny.framer.website/">Home</a>
        <a href="production">Production</a>
        <a href="marketing">Marketing</a>
        <div class="nav-dropdown">
          <a href="label">Label <span class="dropdown-arrow">▾</span></a>
          <div class="nav-dropdown-menu">
            <a href="roster">Roster</a>
          </div>
        </div>
        <a href="about">About</a>
        <a href="contact" aria-current="page">Contact</a>
      </nav>
    </div>
  </header>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <div class="mobile-menu-backdrop" id="mobileMenuBackdrop"></div>
    <div class="mobile-menu-panel">
      <button
        class="mobile-menu-close"
        id="mobileMenuClose"
        aria-label="Close menu"
        type="button"
      >
        Tap to close ✕
      </button>
      <nav class="mobile-nav" aria-label="Mobile navigation">
        <a href="https://cfny.framer.website/">Home</a>
        <a href="production">Production</a>
        <a href="marketing">Marketing</a>
        <div class="nav-dropdown">
          <a href="label">Label <span class="dropdown-arrow">▾</span></a>
          <div class="nav-dropdown-menu">
            <a href="roster">Roster</a>
          </div>
        </div>
        <a href="about">About</a>
        <a href="contact" aria-current="page">Contact</a>
      </nav>
    </div>
  </div>

  <!-- PAGE -->
  <main class="page">

	<section class="contact-shell">

	  <div class="contact-intro">
		<br>
		<br>
		<p>
		  Have a project, idea, or collaboration in mind?
		  Let’s build something that travels.
		</p>
	  </div>

	  <!-- FORM -->
	  <form class="contact-form" id="contactForm">

		<div class="form-row">
		  <input type="text" name="name" placeholder="Name" required>
		</div>

		<div class="form-row">
		  <input type="email" name="email" placeholder="Email" required>
		</div>

		<div class="form-row">
		  <input type="text" name="company" placeholder="Artist / Brand">
		</div>

		<div class="form-row">
		  <select name="service" required>
			<option value="">Service</option>
			<option>Production</option>
			<option>Marketing</option>
			<option>Label</option>
			<option>Other</option>
		  </select>
		</div>

		<div class="form-row">
		  <textarea name="message" placeholder="Tell us about the project" required></textarea>
		</div>

		<button type="submit" class="form-submit" id="formSubmitBtn">
		  Send Inquiry
		</button>

		<p id="formStatus" style="display:none;margin-top:14px;font-size:13px;letter-spacing:.06em;text-transform:uppercase;"></p>

	  </form>

	  <script>
		document.getElementById('contactForm').addEventListener('submit', async function(e) {
		  e.preventDefault();
		  const btn    = document.getElementById('formSubmitBtn');
		  const status = document.getElementById('formStatus');
		  btn.textContent = 'Sending…';
		  btn.disabled = true;
		  status.style.display = 'none';

		  try {
			const res = await fetch('https://formspree.io/f/mdapalzz', {
			  method: 'POST',
			  headers: { 'Accept': 'application/json' },
			  body: new FormData(this)
			});
			const data = await res.json();
			if (res.ok) {
			  status.style.color = 'rgba(255,255,255,0.7)';
			  status.textContent = 'Message sent — we\'ll be in touch.';
			  status.style.display = 'block';
			  this.reset();
			  btn.textContent = 'Sent';
			} else {
			  throw new Error(data.error || 'submission failed');
			}
		  } catch (err) {
			status.style.color = '#ff6b6b';
			status.textContent = 'Something went wrong. Email us directly at production@capitalflightny.com';
			status.style.display = 'block';
			btn.textContent = 'Send Inquiry';
			btn.disabled = false;
		  }
		});
	  </script>

	</section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
	<div class="footer-inner">
	  <div class="footer-copy">© Capital Flight New York</div>
	  <nav class="footer-socials" aria-label="Social links">
        <a href="https://www.instagram.com/capitalflightny/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.6" fill="none"/>
            <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.6" fill="none"/>
            <circle cx="17.2" cy="6.8" r="1.2" fill="currentColor"/>
          </svg>
        </a>
        <a href="https://www.youtube.com/@CapitalFlightNY" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="2.5" y="6" width="19" height="12" rx="3" stroke="currentColor" stroke-width="1.6" fill="none"/>
            <polygon points="10,9 16,12 10,15" fill="currentColor"/>
          </svg>
        </a>
        <a href="https://www.linkedin.com/company/capital-flight-ny" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.6" fill="none"/>
            <rect x="6.5" y="10" width="2.5" height="7" fill="currentColor"/>
            <circle cx="7.75" cy="7.5" r="1.3" fill="currentColor"/>
            <path d="M12 10h2.2v1.2c.5-.8 1.4-1.4 2.8-1.4 2 0 3 1.2 3 3.5V17h-2.6v-3.3c0-1-.3-1.7-1.3-1.7s-1.6.7-1.6 1.7V17H12z" fill="currentColor"/>
          </svg>
        </a>
        <a href="mailto:production@capitalflightny.com" aria-label="Email">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2.5" stroke="currentColor" stroke-width="1.6" fill="none"/>
            <path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.6" fill="none"/>
          </svg>
        </a>
      </nav>
	</div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
