  <link rel="stylesheet" href="style.css">
  <style>
    .giphy-search-wrap{
      display: flex;
      justify-content: center;
      margin: 0 0 40px;
    }

    .giphy-search{
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 12px 20px;
      width: 100%;
      max-width: 480px;
      outline: none;
      transition: border-color 0.2s;
    }

    .giphy-search::placeholder{ color: rgba(255,255,255,0.3); }
    .giphy-search:focus{ border-color: rgba(255,255,255,0.35); }

    .giphy-grid{
      columns: 3;
      column-gap: 12px;
      padding: 0 24px 60px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media(max-width:700px){
      .giphy-grid{ columns: 2; }
    }
    @media(max-width:420px){
      .giphy-grid{ columns: 1; }
    }

    .giphy-item{
      break-inside: avoid;
      margin-bottom: 12px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .giphy-item:hover{
      transform: scale(1.02);
      opacity: 0.9;
    }

    .giphy-item img{
      width: 100%;
      display: block;
    }

    .giphy-loading{
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 60px 0;
    }

    .giphy-lightbox{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .giphy-lightbox.is-open{
      opacity: 1;
      pointer-events: auto;
    }

    .giphy-lightbox img{
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 10px;
    }

    .giphy-lightbox-close{
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
    }
  </style>
</head>

  <script src="app.js"></script>
  <script>
    const API_KEY = 'rSF4xwW6RrxmQev5PirpyRlV9cNHooq0';
    const grid = document.getElementById('giphyGrid');
    const loading = document.getElementById('giphyLoading');
    const lightbox = document.getElementById('giphyLightbox');
    const lightboxImg = document.getElementById('giphyLightboxImg');
    const closeBtn = document.getElementById('giphyClose');
    const searchInput = document.getElementById('giphySearch');

    let debounceTimer;

    async function fetchGifs(query) {
      loading.style.display = 'block';
      grid.innerHTML = '';
      const endpoint = query
        ? `https://api.giphy.com/v1/gifs/search?api_key=${API_KEY}&q=${encodeURIComponent(query)}&limit=30&rating=g`
        : `https://api.giphy.com/v1/gifs/trending?api_key=${API_KEY}&limit=30&rating=g`;

      try {
        const res = await fetch(endpoint);
        const { data } = await res.json();
        loading.style.display = 'none';
        data.forEach(gif => {
          const item = document.createElement('div');
          item.className = 'giphy-item';
          const img = document.createElement('img');
          img.src = gif.images.fixed_width.url;
          img.alt = gif.title;
          img.loading = 'lazy';
          item.appendChild(img);
          item.addEventListener('click', () => openLightbox(gif.images.original.url, gif.title));
          grid.appendChild(item);
        });
      } catch {
        loading.textContent = 'Failed to load GIFs.';
      }
    }

    function openLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt;
      lightbox.classList.add('is-open');
    }

    function closeLightbox() {
      lightbox.classList.remove('is-open');
      lightboxImg.src = '';
    }

    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => fetchGifs(searchInput.value.trim()), 400);
    });

    fetchGifs();
  </script>
